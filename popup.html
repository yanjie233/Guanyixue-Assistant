<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>莞易学助手</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      width: 260px;
      font-family: "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #222;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .value {
      font-size: 22px;
      font-weight: 700;
      color: #1f7aec;
      word-break: break-all;
    }
    .sub {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    .btn {
      margin-top: 10px;
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      background: #1f7aec;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="title">莞易学助手</div>
  <div class="label">学习时长（studyTime）</div>
  <div id="study-time" class="value">加载中...</div>
  <div id="study-time-friendly" class="sub"></div>
  <button id="refresh" class="btn">刷新</button>

  <script src="popup.js"></script>
</body>
</html>
